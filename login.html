<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Your City Beads</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
     <section id="header">
        <a href="#"><img src="Images/logo.png" class="logo"></a>
        <div>
           <ul id="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="product.html">Products</a></li>
            <li><a href="signup.html">Sign up</a></li>
            <li><a class="active" href="login.html">Login</a></li>
            <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a></li>
            <li><a href="profile.html"><i class="fa-solid fa-user"></i></a></li>
           </ul> 
        </div>
    </section>
    <section class="auth-section">
        <div class="auth-box">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            <p id="loginError" style="color:red; display:none;">Invalid credentials! Please sign up.</p>
        </div>
    </section>

    <script>
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', function(e){
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple demo logic, replace with your backend verification
            if(email === "test@example.com" && password === "1234"){
                alert("Login successful!");
            } else {
                document.getElementById('loginError').style.display = "block";
            }
        });
    </script>
<script src="login.js"></script>
</body>
</html>

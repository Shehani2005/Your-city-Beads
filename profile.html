<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
     <section id="header">
        <a href="index.html"><img src="Images/logo.png" class="logo"></a>
        <div>
           <ul id="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="product.html">Products</a></li>
            <li><a href="signup.html">Sign up</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a></li>
            <li><a class="active" href="profile.html"><i class="fa-solid fa-user"></i></a></li>
           </ul> 
        </div>
    </section>

<div class="profile-container">

    <div class="profile-header">
        <div class="profile-pic" id="profilePic">VS</div>
        <h2 id="userName">Name</h2>
        <p class="role">Customer</p>
    </div>

    <div class="profile-details">

        <div class="info">
            <label>Email</label>
            <input type="text" id="email">
        </div>

        <div class="info">
            <label>Phone</label>
            <input type="text" id="phone">
        </div>

        <div class="info">
            <label>Address</label>
            <input type="text" id="address">
        </div>

    </div>

    <button class="edit-btn" onclick="toggleEdit()">Edit Profile</button>
    <button class="edit-btn" id="saveBtn" onclick="saveProfile()" style="display:none;">Save</button>

</div>

<script src="profile.js"></script>
</body>
</html>

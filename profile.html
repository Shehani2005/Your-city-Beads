<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title -->
    <title>My Profile</title>
     <!-- External CSS files -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Header / Navigation -->
    <section id="header">
    <!-- Logo linking back to home -->
    <a href="index.html"><img src="Images/logo.png" class="logo"></a>

    <!-- Navigation menu -->
    <div>
        <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html">Products</a></li>
        <li><a href="signup.html">Sign up</a></li>
        <li><a href="login.html">Login</a></li>
        <!-- Cart icon -->
        <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a></li>
        <!-- Profile icon (active page) -->
        <li><a class="active" href="profile.html"><i class="fa-solid fa-user"></i></a></li>
        </ul> 
        </div>
    </section>

<!-- Main profile container -->
<div class="profile-container">

    <!-- Profile header -->
    <div class="profile-header">
    <!-- Profile picture / initials -->
    <div class="profile-pic" id="profilePic">VS</div>
    <!-- User name -->
    <h2 id="userName">Name</h2>
    <!-- User name -->
    <p class="role">Customer</p>
    </div>

    <!-- Profile details section (editable fields) -->
    <div class="profile-details">

    <!-- Email -->
    <div class="info">
        <label>Email</label>
        <input type="text" id="email">
    </div>

    <!-- Phone -->
    <div class="info">
        <label>Phone</label>
        <input type="text" id="phone">
    </div>

    <!-- Address -->
    <div class="info">
        <label>Address</label>
        <input type="text" id="address">
    </div>

    </div>

    <!-- Edit and Save buttons -->
    <button class="edit-btn" onclick="toggleEdit()">Edit Profile</button>
    <button class="edit-btn" id="saveBtn" onclick="saveProfile()" style="display:none;">Save</button>

</div>

 <!-- JavaScript file -->
<script src="profile.js"></script>

</body>
</html>
